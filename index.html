---
layout: default
title: Home
---
<h1 class="text-3xl font-bold mb-6">All posts combined</h1>
<div class="grid md:grid-cols-3 gap-8">
  {% for post in site.posts %}
    <article class="bg-white p-6 rounded-lg shadow hover:shadow-lg">
      <h2 class="text-xl font-semibold mb-2">
        <a href="{{ post.url }}" class="text-blue-600 hover:underline">{{ post.title }}</a>
      </h2>
      <p class="text-gray-600 mb-4">{{ post.excerpt }}</p>
      <a href="{{ post.url }}" class="text-blue-600 font-semibold hover:underline">Read more →</a>
    </article>
  {% endfor %}
</div>
